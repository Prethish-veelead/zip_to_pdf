<svg width="100%" viewBox="0 0 680 210" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Merging loading animation</title>
  <desc>Multiple golden chunk tiles stream inward and converge into a single sealed document, representing the merging phase</desc>

  <!-- Left chunks: slide right toward center, fade out, snap back -->
  <g opacity="0.9">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 72 0; 0 0; 0 0" keyTimes="0;0.55;0.9;1"
      calcMode="spline" keySplines="0.3 0 0.5 1; 0.5 0 0.7 1; 0 0 1 1"
      dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0;0.9" keyTimes="0;0.55;0.9;1" dur="2.5s" repeatCount="indefinite"/>
    <rect x="240" y="80" width="34" height="22" rx="4" fill="#C47808" stroke="#FFD040" stroke-width="0.8"/>
    <rect x="252" y="104" width="44" height="16" rx="4" fill="#B86C08" stroke="#FFCA30" stroke-width="0.8"/>
    <rect x="244" y="62" width="38" height="16" rx="4" fill="#D4900A" stroke="#FFD040" stroke-width="0.8"/>
  </g>

  <!-- Right chunks: slide left toward center, fade out, snap back -->
  <g opacity="0.9">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; -72 0; 0 0; 0 0" keyTimes="0;0.55;0.9;1"
      calcMode="spline" keySplines="0.3 0 0.5 1; 0.5 0 0.7 1; 0 0 1 1"
      dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0;0.9" keyTimes="0;0.55;0.9;1" dur="2.5s" repeatCount="indefinite"/>
    <rect x="406" y="80" width="34" height="22" rx="4" fill="#C47808" stroke="#FFD040" stroke-width="0.8"/>
    <rect x="384" y="104" width="44" height="16" rx="4" fill="#B86C08" stroke="#FFCA30" stroke-width="0.8"/>
    <rect x="398" y="62" width="38" height="16" rx="4" fill="#D4900A" stroke="#FFD040" stroke-width="0.8"/>
  </g>

  <!-- Center document: fades in as chunks arrive -->
  <g opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.15;0.95;0.95;0.15" keyTimes="0;0.4;0.6;0.9;1" dur="2.5s" repeatCount="indefinite"/>
    <rect x="308" y="46" width="64" height="84" rx="6" fill="#C48820" stroke="#F5C030" stroke-width="1.5"/>
    <!-- Dog-ear corner -->
    <rect x="352" y="46" width="20" height="20" rx="2" fill="#8A5C10" opacity="0.5"/>
    <polygon points="352,46 372,46 372,66" fill="#7A5010" opacity="0.7"/>
    <!-- Document lines -->
    <g stroke="#FFE060" stroke-width="1.5">
      <line x1="318" y1="76" x2="362" y2="76" opacity="0.7"/>
      <line x1="318" y1="86" x2="362" y2="86" opacity="0.7"/>
      <line x1="318" y1="96" x2="356" y2="96" opacity="0.7"/>
      <line x1="318" y1="106" x2="362" y2="106" opacity="0.7"/>
      <line x1="318" y1="116" x2="350" y2="116" opacity="0.7"/>
    </g>
  </g>

  <!-- Merge ring: expands and fades when chunks converge -->
  <circle cx="340" cy="90" fill="none" stroke="#FFD700" stroke-width="2.5">
    <animate attributeName="r" values="4;4;20;30;30" keyTimes="0;0.5;0.62;0.78;1" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.8;0;0" keyTimes="0;0.5;0.62;0.78;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Progress bar (animates 90% → 95%) -->
  <rect x="198" y="148" width="144" height="8" rx="4" fill="#3A2A08" opacity="0.5"/>
  <rect x="198" y="148" height="8" rx="4" fill="#D4A020">
    <animate attributeName="width" values="130;137;130" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </rect>
  <text x="198" y="142" font-family="sans-serif" font-size="11" fill="#C4880A" font-weight="500">90%</text>
  <text x="336" y="142" font-family="sans-serif" font-size="11" fill="#C4880A" font-weight="500">95%</text>

  <!-- Label -->
  <text x="340" y="176" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#D4A020" letter-spacing="2">MERGING</text>

  <!-- Loading dots (sequential pulse) -->
  <circle cx="420" cy="172" r="3" fill="#D4A020">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="431" cy="172" r="3" fill="#D4A020">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="442" cy="172" r="3" fill="#D4A020">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
</svg>
