<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZipForge — ZIP to PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
          <polygon points="14,7 21,11 21,19 14,23 7,19 7,11" fill="var(--accent)" opacity="0.15"/>
          <path d="M9 12h10M9 16h6" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">ZipForge</span>
      </div>
      <nav id="step-nav" class="step-nav" aria-label="Progress steps"></nav>
      <button id="clear-cache-btn" class="btn-clear-cache" title="Clear memory and reset app">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        Clear Cache
      </button>
    </header>

    <main id="main-content" role="main"></main>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <!-- Local Offline Dependencies -->
  <script src="libs/jszip.min.js"></script>
  <script src="libs/jspdf.umd.min.js"></script>
  <script src="libs/Sortable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
